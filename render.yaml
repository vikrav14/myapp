services:
  - type: web
    name: mauri-backend
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    autoDeployTrigger: commit
    healthCheckPath: /ready
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GOOGLE_AI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CLAUDE_MODEL
        value: claude-sonnet-5
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_REACTIONS_ENABLED
        value: "true"
      - key: WHATSAPP_MARK_READ_ENABLED
        value: "true"
      - key: WHATSAPP_INTERACTIVE_ENABLED
        value: "true"
      - key: WHATSAPP_TYPING_INDICATOR_ENABLED
        value: "true"
      - key: PROACTIVE_DAILY_BUDGET
        value: "2"
      - key: MCB_JUICE_PAYMENT_LINK
        sync: false
      - key: BLINK_PAYMENT_LINK
        sync: false
      - key: BLINK_API_KEY
        sync: false
      - key: BLINK_SECRET_KEY
        sync: false
      - key: BLINK_TOKEN_API_URL
        value: https://api.blinkpayment.co.uk/api/pay/v1/tokens
      - key: SUBSCRIPTION_MONTHLY_PRICE_RS
        value: "200"
      - key: DEFAULT_SUBSCRIPTION_DAYS
        value: "30"
      - key: INTERNAL_ADMIN_API_KEY
        sync: false
      - key: EMBEDDING_MODEL
        value: text-embedding-004
      - key: EMBEDDING_OUTPUT_DIMENSIONS
        value: "1536"
      - key: MCB_JUICE_CALLBACK_TOKEN
        sync: false
      - key: BLINK_CALLBACK_TOKEN
        sync: false
      - key: PAYMENT_CALLBACK_BASE_URL
        sync: false
      - key: PAYMENT_RETURN_URL
        sync: false
      - key: PEACH_ENTITY_ID
        sync: false
      - key: PEACH_CHECKOUT_SECRET
        sync: false
      - key: PEACH_CHECKOUT_URL
        value: https://secure.peachpayments.com/checkout/initiate
      - key: BLINK_PAYLINK_API_URL
        value: https://api.blinkpayment.co.uk/api/paylink/v1/paylinks
      - key: PEACH_WEBHOOK_SECRET
        sync: false
      - key: PEACH_WEBHOOK_TOLERANCE_SECONDS
        value: "300"
      - key: OUTBOUND_RETRY_MAX_ATTEMPTS
        value: "5"
      - key: OUTBOUND_RETRY_BASE_DELAY_SECONDS
        value: "60"
      - key: OUTBOUND_RETRY_CRON
        value: "*/5 * * * *"
      - key: ALERT_OUTBOUND_PENDING_THRESHOLD
        value: "25"
      - key: ALERT_OUTBOUND_FAILED_THRESHOLD
        value: "10"
      - key: ALERT_OPEN_DEAD_LETTER_THRESHOLD
        value: "5"
      - key: ALERT_SECURITY_WARNINGS_THRESHOLD
        value: "1"
      - key: ALERT_AUDIT_ERRORS_THRESHOLD
        value: "5"
      - key: ALERT_INBOUND_DUPLICATE_DELIVERIES_THRESHOLD
        value: "10"
      - key: ALERT_EVALUATION_CRON
        value: "*/5 * * * *"
      - key: ALERT_WEBHOOK_URL
        sync: false
      - key: ALERT_WEBHOOK_NOTIFY_ON_RESOLVE
        value: "false"
      - key: MORNING_BRIEF_ENABLED
        value: "true"
      - key: MORNING_BRIEF_TIMEZONE
        value: Indian/Mauritius
      - key: MORNING_BRIEF_SCRAPE_CRON
        value: "30 4 * * *"
      - key: MORNING_BRIEF_CURATE_CRON
        value: "0 5 * * *"
      - key: MORNING_BRIEF_DELIVER_CRON
        value: "0 7 * * *"
      - key: MORNING_BRIEF_RSS_FEEDS
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: QUANTUM_PICK_ENABLED
        value: "true"
      - key: ANU_QUANTUM_API_KEY
        sync: false
      - key: ANU_QUANTUM_API_URL
        value: https://api.quantumnumbers.anu.edu.au
      - key: QUANTUM_REQUEST_TIMEOUT_MS
        value: "2500"
      - key: REMINDERS_ENABLED
        value: "true"
      - key: REMINDER_DELIVERY_CRON
        value: "* * * * *"
      - key: CALENDAR_SYNC_ENABLED
        value: "true"
      - key: CALENDAR_SYNC_CRON
        value: "*/15 * * * *"
      - key: CALENDAR_DELIVERY_CRON
        value: "*/5 * * * *"
      - key: CALENDAR_TODO_LOOKAHEAD_MINUTES
        value: "30"
      - key: MEMORY_RESURFACING_ENABLED
        value: "true"
      - key: MEMORY_RESURFACING_CRON
        value: "0 11 * * *"
      - key: RECEIPT_SCAN_ENABLED
        value: "true"
      - key: PAYDAY_RUNWAY_ENABLED
        value: "true"
      - key: LOCAL_ALERTS_ENABLED
        value: "true"
      - key: LOCAL_ALERTS_CRON
        value: "*/30 21-23,0-7 * * *"
      - key: LOCAL_ALERT_RSS_FEEDS
        sync: false
      - key: USER_MIND_SNAPSHOTS_ENABLED
        value: "true"
      - key: USER_MIND_REFLECT_CRON
        value: "0 2 * * *"
      - key: USER_MIND_LOOKBACK_DAYS
        value: "7"
      - key: USER_MIND_ACTIVITY_LOOKBACK_DAYS
        value: "14"
      - key: USER_MIND_BATCH_SIZE
        value: "25"
      - key: OPEN_LOOP_FOLLOWUPS_ENABLED
        value: "true"
      - key: OPEN_LOOP_FOLLOWUP_CRON
        value: "0 10 * * *"
      - key: OPEN_LOOP_FOLLOWUP_HOUR
        value: "10"
      - key: OPEN_LOOP_FOLLOWUP_MINUTE
        value: "0"
      - key: PROACTIVE_CHECKINS_ENABLED
        value: "true"
      - key: PROACTIVE_CHECKIN_CRON
        value: "0 16 * * *"
      - key: PROACTIVE_CHECKIN_HOUR
        value: "16"
      - key: PROACTIVE_CHECKIN_MINUTE
        value: "0"
      - key: TRUST_PROXY
        value: "true"
      - key: ENABLE_SECURITY_HEADERS
        value: "true"
      - key: ADMIN_IP_ALLOWLIST
        sync: false
      - key: METRICS_IP_ALLOWLIST
        sync: false
      - key: PAYMENT_WEBHOOK_IP_ALLOWLIST
        sync: false
      - key: WHATSAPP_WEBHOOK_IP_ALLOWLIST
        sync: false
